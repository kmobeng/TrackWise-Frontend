<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- font-awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="styles/style.css" />
    <link rel="stylesheet" href="styles/register.css" />
    <link rel="stylesheet" href="styles/reset-password.css" />
    <title>Reset Password</title>
  </head>
  <body>
    <div class="container">
      <div class="left">
        <a href="/index.html" class="logo">TrackWise</a>
        <h2 class="left-title">ALMOST THERE</h2>
        <p class="left-subtitle">Set a new password.</p>
        <p class="left-description">
          Pick something you'll remember but a stranger won't guess.
        </p>
        <p class="left-copyright">© 2026 TrackWise</p>
      </div>
      <div class="right">
        <div class="right-content">
          <a href="/index.html" class="right-logo">TrackWise</a>
          <h2 class="right-title">New Password</h2>
          <p class="right-description">
            At least 8 characters. Use a mix you'll recognize.
          </p>
          <p class="error-message" id="form-error"></p>
          <form id="reset-password-form" class="reset-password-form">
            <div class="form-input">
              <label for="password"> New Password </label>
              <input
                type="password"
                autocomplete="off"
                id="password"
                name="password"
                placeholder="Create a password"
              />
              <p class="error-message" id="password-error"></p>
            </div>
            <div class="form-input">
              <label for="confirm-password"> Confirm Password </label>
              <input
                type="password"
                autocomplete="off"
                id="confirm-password"
                name="confirm-password"
                placeholder="Confirm your password"
              />
              <p class="error-message" id="confirm-password-error"></p>
            </div>
            <button type="submit" class="register-btn">Update Password</button>
          </form>
        </div>
      </div>
    </div>
    <script type="module" src="./js/reset-password.js"></script>
  </body>
</html>
