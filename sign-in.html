<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- font-awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="styles/style.css" />
    <link rel="stylesheet" href="styles/register.css" />
    <title>Sign In</title>
  </head>
  <body>
    <div class="container">
      <div class="left">
        <a href="/index.html" class="logo">TrackWise</a>
        <h2 class="left-title">WELCOME BACK</h2>
        <p class="left-subtitle">Pick up where you left off.</p>
        <p class="left-description">
          A quieter way to track money. Built for Ghanaians who'd rather live
          than wrangle a spreadsheet.
        </p>
        <p class="left-copyright">© 2026 TrackWise</p>
      </div>
      <div class="right">
        <div class="right-content">
          <a href="/index.html" class="right-logo">TrackWise</a>
          <h2 class="right-title">Sign In</h2>
          <p class="right-description">
            Use your email and password to sign in.
          </p>
          <form id="sign-in-form" >
            <p id="form-error" class="error-message"></p>
            <div class="form-input">
              <label for="email"> Email </label>
              <input
                type="text"
                id="email"
                name="email"
                autocomplete="off"
                placeholder="you@example.com"
              />
              <p class="error-message" id="email-error"></p>
            </div>
            <div class="form-input">
              <div class="password">
                <label for="password"> Password </label>
                <a href="forgot-password.html">forgot?</a>
              </div>
              <input
                type="password"
                autocomplete="off"
                id="password"
                name="password"
                placeholder="Create a password"
              />
              <p class="error-message" id="password-error"></p>
            </div>
            <button type="submit" class="register-btn" id="sign-in-btn">
              Sign In
            </button>
          </form>
          <div class="or-container">
            <div class="empty"></div>
            <span class="or">OR</span>
            <div class="empty"></div>
          </div>

          <button class="google-btn">
            <i class="fa-brands fa-google"></i> Continue with Google
          </button>
          <p class="right-signin">
            New here? <a href="register.html">Create an account</a>
          </p>
        </div>
      </div>
    </div>
    <script type="module" src="./js/sign-in.js"></script>
  </body>
</html>
