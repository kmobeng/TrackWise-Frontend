<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- font-awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="styles/style.css" />
    <link rel="stylesheet" href="styles/register.css" />
    <link rel="stylesheet" href="styles/forgot-password.css" />
    <title>Forgot Password</title>
  </head>
  <body>
    <div class="container">
      <div class="left">
        <a href="/index.html" class="logo">TrackWise</a>
        <h2 class="left-title">RESET PASSWORD</h2>
        <p class="left-subtitle">
          <span>Forgot it. </span>
          <span>It happens.</span>
        </p>
        <p class="left-description">
          Tell us the email on your account and we'll send a link to set a new
          password.
        </p>
        <p class="left-copyright">© 2026 TrackWise</p>
      </div>
      <div class="right">
        <div class="right-content">
          <a href="/index.html" class="right-logo">TrackWise</a>
          <h2 class="right-title">Reset your password</h2>
          <p class="right-description">Enter the email tied to your account.</p>
          <form>
            <div class="form-input">
              <label for="email"> Email </label>
              <input
                type="email"
                id="email"
                name="email"
                autocomplete="off"
                placeholder="you@example.com"
              />
            </div>
            <button type="submit" class="register-btn">Send Reset Link</button>
          </form>
          <p class="back">
            <i class="fa-solid fa-arrow-left"></i
            ><a href="/register.html">Back to sign up</a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
