<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- font-awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="styles/style.css" />
    <link rel="stylesheet" href="styles/register.css" />
    <link rel="stylesheet" href="styles/verify-email.css" />
    <title>Verify Email</title>
  </head>
  <body>
    <div class="container">
      <div class="left">
        <h1 class="logo">TrackWise</h1>
        <h2 class="left-title">ONE LAST STOP</h2>
        <p class="left-subtitle">Check your inbox, we sent a code.</p>
        <p class="left-description">
          Confirm your email to keep your budgets, expenses, and reports safe.
        </p>
        <p class="left-copyright">© 2026 TrackWise</p>
      </div>
      <div class="right">
        <div class="right-content">
          <h1 class="right-logo">TrackWise</h1>
          <h2 class="right-title">Verify your email</h2>
          <p class="right-description">
            Enter the 6-digit code we just sent to your email address.
          </p>
          <form id="verify-form">
          <p id="form-error" class="error-message"></p>
            <div class="otp-container">
              <input type="text" maxlength="1" class="otp-box" />
              <input type="text" maxlength="1" class="otp-box" />
              <input type="text" maxlength="1" class="otp-box" />
              <input type="text" maxlength="1" class="otp-box" />
              <input type="text" maxlength="1" class="otp-box" />
              <input type="text" maxlength="1" class="otp-box" />
            </div>
            <button type="submit" class="register-btn" id="verify-btn">Verify and continue</button>
          </form>
          <p class="right-signin">
              Didn't receive it?
              <span id="resend"
                ><a href="/verify-email.html">Resend code</a></span
              >
            </p>
          </div>
          <p class="back">
            <i class="fa-solid fa-arrow-left"></i
            ><a href="/register.html?switch=true">Back to sign up</a>
          </p>
        </div>
      </div>
    </div>
    <script type="module" src="./js/verify-email.js"></script>
  </body>
</html>
